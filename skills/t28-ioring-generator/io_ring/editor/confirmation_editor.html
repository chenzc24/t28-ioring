<script>
// Global error reporter — shows any uncaught JS error on the page instead of blank white
window.onerror = function(msg, src, line, col, err) {
  var div = document.getElementById('fatal-error');
  if (div) { div.style.display = 'block'; div.textContent = 'JS ERROR:\n' + msg + '\n' + (src||'') + ':' + line + ':' + col + '\n\n' + (err && err.stack ? err.stack : ''); }
};
window.addEventListener('unhandledrejection', function(e) {
  var div = document.getElementById('fatal-error');
  if (div) { div.style.display = 'block'; div.textContent = 'Unhandled Promise Rejection:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)); }
});

// Minimal store creator — uses useState/useEffect, no useSyncExternalStore needed
function create(initializer) {
  var state;
  var listeners = new Set();

  function setState(partial) {
    var next = typeof partial === 'function' ? partial(state) : partial;
    state = Object.assign({}, state, next);
    listeners.forEach(function(fn) { fn(); });
  }

  function getState() { return state; }

  function subscribe(listener) {
    listeners.add(listener);
    return function() { listeners.delete(listener); };
  }

  state = initializer(setState, getState);

  function useStore(selector) {
    var sel = typeof selector === 'function' ? selector : function(s) { return s; };
    // Use a counter to force re-renders when the store updates
    var pair = React.useState(0);
    var forceUpdate = pair[1];
    React.useEffect(function() {
      function notify() { forceUpdate(function(n) { return n + 1; }); }
      listeners.add(notify);
      return function() { listeners.delete(notify); };
    }, []);
    return sel(state);
  }

  useStore.getState = getState;
  useStore.setState = setState;
  useStore.subscribe = subscribe;

  return useStore;
}

// ============================================================
// SECTION 1: pinConfigTemplates + ioAdapter
// ============================================================

const DEFAULT_T180_PROFILE = {
  analog: { regPwr: 'VIOLA', regGnd: 'GIOLA', vdPwr: 'VIOHA', vdGnd: 'GIOHA' },
  digital: { regPwr: 'VIOLD', regGnd: 'GIOLD', vdPwr: 'VIOHD', vdGnd: 'GIOHD' },
};
const DEFAULT_T28_PROFILE = {
  analog: { regPwr: 'AVDD', regGnd: 'AVSS', vdPwr: 'TACVDD', vdGnd: 'TACVSS' },
  digital: { regPwr: 'VIOL', regGnd: 'GIOL', vdPwr: 'VIOH', vdGnd: 'GIOH' },
};
const PROCESS_DEFAULTS = { T28: DEFAULT_T28_PROFILE, T180: DEFAULT_T180_PROFILE };
const T28_SUPPORTED_DEVICES = new Set(['PDDW16SDGZ_V_G','PDDW16SDGZ_H_G','PRUW08SDGZ_V_G','PRUW08SDGZ_H_G','PVDD1DGZ_V_G','PVDD1DGZ_H_G','PVSS1DGZ_V_G','PVSS1DGZ_H_G','PVDD2POC_V_G','PVDD2POC_H_G','PVSS2DGZ_V_G','PVSS2DGZ_H_G','PDB3AC_V_G','PDB3AC_H_G','PVDD1AC_V_G','PVDD1AC_H_G','PVSS1AC_V_G','PVSS1AC_H_G','PVDD1A_V_G','PVDD1A_H_G','PVSS1A_V_G','PVSS1A_H_G','PVSS2A_V_G','PVSS2A_H_G','PVDD3A_V_G','PVDD3A_H_G','PVSS3A_V_G','PVSS3A_H_G','PVDD3AC_V_G','PVDD3AC_H_G','PVSS3AC_V_G','PVSS3AC_H_G']);
const T180_SUPPORTED_DEVICES = new Set(['PVDD1ANA','PVSS1ANA','PVDD1CDG','PVSS1CDG','PVDD2CDG','PVSS2CDG','PDDW0412SCDG']);
const T180_ANALOG_PREFERRED_DEVICES = new Set(['PVDD1ANA','PVSS1ANA']);
const T180_DIGITAL_STRICT_DEVICES = new Set(['PDDW0412SCDG']);
const SUPPORTED_DEVICES_BY_NODE = { T28: T28_SUPPORTED_DEVICES, T180: T180_SUPPORTED_DEVICES };
const PIN_LABEL_FALLBACKS = { analogPwr:'AVDD', analogGnd:'AVSS', digitalVdd:'VIOL', digitalVss:'GIOL', digitalVddPst:'VIOH', digitalVssPst:'GIOH' };
const resolveDomain = (domain) => String(domain||'').toLowerCase()==='digital'?'digital':'analog';
const resolveProcessNode = (processNode) => { const n=String(processNode||'T180').toUpperCase(); if(n==='T180')return'T180'; if(n==='T28')return'T28'; return null; };
const normalizeDeviceName = (device) => String(device||'').trim().toUpperCase();
const getSupportedDevices = (resolvedNode) => resolvedNode==='T180'?SUPPORTED_DEVICES_BY_NODE.T180:SUPPORTED_DEVICES_BY_NODE.T28;
const matchesT28Family = (device, familyPrefix) => device.startsWith(`${familyPrefix}_`);
const T28_DIGITAL_FAMILIES = new Set(['PDDW16SDGZ','PRUW08SDGZ','PVDD1DGZ','PVSS1DGZ','PVDD2POC','PVSS2DGZ']);
const getSupportedDevicesForProcess = (processNode) => { const resolved=resolveProcessNode(processNode)||'T180'; return Array.from(SUPPORTED_DEVICES_BY_NODE[resolved]); };
const isSupportedDeviceForProcess = (processNode,device) => { const resolved=resolveProcessNode(processNode); if(!resolved)return false; const nd=normalizeDeviceName(device); if(!nd)return false; return SUPPORTED_DEVICES_BY_NODE[resolved].has(nd); };
const classifyDeviceForProcess = (processNode,device) => { const resolved=resolveProcessNode(processNode); const nd=normalizeDeviceName(device); if(!resolved||!nd)return'unsupported'; if(!SUPPORTED_DEVICES_BY_NODE[resolved].has(nd))return'unsupported'; if(resolved==='T180'){if(T180_DIGITAL_STRICT_DEVICES.has(nd))return'digital'; if(T180_ANALOG_PREFERRED_DEVICES.has(nd))return'analog'; return'unsupported';} const isT28Digital=Array.from(T28_DIGITAL_FAMILIES).some(f=>matchesT28Family(nd,f)); return isT28Digital?'digital':'analog'; };
const resolveT28Labels = (profile) => ({ analogPwrRef:profile.analog.regPwr||PIN_LABEL_FALLBACKS.analogPwr, analogGndRef:profile.analog.regGnd||PIN_LABEL_FALLBACKS.analogGnd, digitalVdd:profile.digital.regPwr||PIN_LABEL_FALLBACKS.digitalVdd, digitalVss:profile.digital.regGnd||PIN_LABEL_FALLBACKS.digitalVss, digitalVddPst:profile.digital.vdPwr||PIN_LABEL_FALLBACKS.digitalVddPst, digitalVssPst:profile.digital.vdGnd||PIN_LABEL_FALLBACKS.digitalVssPst });
const buildCoreName = (instanceName,fallback) => { const name=String(instanceName||'').trim(); return name?`${name}_CORE`:`${fallback}_CORE`; };
const matchesDeviceFamily = (device,familyPrefix) => device.startsWith(`${familyPrefix}_`);
const T28_RULES = [
  { family:'PDB3AC', build:(n,l)=>({AIO:{label:n||'AIO'},TACVSS:{label:l.analogGndRef},TACVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVDD1AC', build:(n,l)=>({AVDD:{label:n||'AVDD'},TACVSS:{label:l.analogGndRef},TACVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVSS1AC', build:(n,l)=>({AVSS:{label:n||'AVSS'},TACVSS:{label:l.analogGndRef},TACVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVDD1A', build:(n,l)=>({AVDD:{label:n||'AVDD'},TAVSS:{label:l.analogGndRef},TAVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVSS1A', build:(n,l)=>({AVSS:{label:n||'AVSS'},TAVSS:{label:l.analogGndRef},TAVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVSS2A', build:(n,l)=>({VSS:{label:n||'VSS'},TAVSS:{label:l.analogGndRef},TAVDD:{label:l.analogPwrRef}}) },
  { family:'PVDD3AC', build:(n,l)=>({AVDD:{label:buildCoreName(n,'AVDD')},TACVSS:{label:l.analogGndRef},TACVDD:{label:n||l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVSS3AC', build:(n,l)=>({AVSS:{label:buildCoreName(n,'AVSS')},TACVSS:{label:n||l.analogGndRef},TACVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVDD3A', build:(n,l)=>({AVDD:{label:buildCoreName(n,'AVDD')},TAVSS:{label:l.analogGndRef},TAVDD:{label:n||l.analogPwrRef},VSS:{label:l.digitalVss}}) },
  { family:'PVSS3A', build:(n,l)=>({AVSS:{label:buildCoreName(n,'AVSS')},TAVSS:{label:n||l.analogGndRef},TAVDD:{label:l.analogPwrRef},VSS:{label:l.digitalVss}}) },
];
const buildT28DigitalPinConfig = (labels) => ({VDD:{label:labels.digitalVdd},VSS:{label:labels.digitalVss},VDDPST:{label:labels.digitalVddPst},VSSPST:{label:labels.digitalVssPst}});
const buildT28PinConfig = (device,instanceName,profile) => { const labels=resolveT28Labels(profile); for(const rule of T28_RULES){if(matchesDeviceFamily(device,rule.family))return rule.build(instanceName,labels);} const isDigitalFamily=Array.from(T28_DIGITAL_FAMILIES).some(f=>matchesDeviceFamily(device,f)); if(isDigitalFamily)return buildT28DigitalPinConfig(labels); return null; };
const resolveProfile = (processNode,pinConfigProfiles) => { const resolvedNode=String(processNode||'T180').toUpperCase(); const resolvedProcessNode=resolveProcessNode(resolvedNode); const externalProfile=pinConfigProfiles&&pinConfigProfiles[resolvedNode]?pinConfigProfiles[resolvedNode]:null; if(externalProfile?.analog&&externalProfile?.digital)return externalProfile; if(!resolvedProcessNode)return null; return PROCESS_DEFAULTS[resolvedProcessNode]||null; };
const SELF_NAME_PIN_BY_DEVICE = {PVDD1ANA:'AVDD',PVSS1ANA:'AVSS',PVDD1CDG:'VDD',PVSS1CDG:'VSS',PVDD2CDG:'VDDPST',PVSS2CDG:'VSSPST'};
const withSelfNamePins = (device,instanceName,pinConfig) => { if(!instanceName)return pinConfig; const targetPin=SELF_NAME_PIN_BY_DEVICE[device]; if(!targetPin)return pinConfig; return{...pinConfig,[targetPin]:{label:instanceName}}; };
const buildPinConfigTemplate = (options) => { const resolvedNode=String(options.processNode||'T180').toUpperCase(); const device=String(options.device||'').toUpperCase(); const instanceName=String(options.instanceName||'').trim(); const supportedDevices=getSupportedDevices(resolvedNode); if(!supportedDevices.has(device))return null; const profile=resolveProfile(resolvedNode,options.pinConfigProfiles); if(!profile)return null; if(resolvedNode==='T28')return buildT28PinConfig(device,instanceName,profile); const domain=resolveDomain(options.domain); const labels=domain==='digital'?profile.digital:profile.analog; const base={VDD:{label:labels.regPwr},VSS:{label:labels.regGnd},VDDPST:{label:labels.vdPwr},VSSPST:{label:labels.vdGnd}}; return withSelfNamePins(device,instanceName,base); };
const supportedProcessNodes = () => Object.keys(PROCESS_DEFAULTS);

// === ioAdapter.js ===
const generateId = () => Math.random().toString(36).substr(2,9);
const RUNTIME_META_KEYS = ['location','_relative_position','_original_position','position'];
const BUSINESS_KEYS = ['view_name','domain','pad_width','pad_height','pin_connection','direction','voltage_domain','orientation'];
const importAdapter = (json) => {
  const sourceInstances = json.layout_data||json.instances||[];
  const processedInstances = sourceInstances.map(extInst => {
    const {position,name,device,type,side,order,id:rawId,meta:rawMeta,...rest} = extInst;
    const normalizedMeta = rawMeta&&typeof rawMeta==='object'?{...rawMeta}:{};
    const runtimeMeta = {};
    RUNTIME_META_KEYS.forEach(key=>{if(normalizedMeta[key]!==undefined)runtimeMeta[key]=normalizedMeta[key];});
    const migratedBusinessFields = {};
    BUSINESS_KEYS.forEach(key=>{if(rest[key]===undefined&&normalizedMeta[key]!==undefined)migratedBusinessFields[key]=normalizedMeta[key];});
    let finalSide; let finalOrder=0;
    if(side&&order!==undefined){finalSide=side; const numericOrder=Number(order); finalOrder=Number.isFinite(numericOrder)?Math.max(1,numericOrder):1;}
    else if(typeof position==='string'){
      const ioMatch=position.match(/^(top|bottom|left|right)_(\d+)$/);
      const innerMatch=position.match(/^(top|bottom|left|right)_(\d+)_(\d+)$/);
      const cornerMatch=position.match(/^(top|bottom)_(left|right)$/);
      if(innerMatch){finalSide=innerMatch[1]; finalOrder=parseInt(innerMatch[2],10)+1; runtimeMeta['_original_position']=position;}
      else if(ioMatch){finalSide=ioMatch[1]; finalOrder=parseInt(ioMatch[2],10)+1;}
      else if(cornerMatch){finalSide='corner'; runtimeMeta['_original_position']=position;}
      else{const instanceLabel=String(name||device||rawId||'unknown'); throw new Error(`Invalid position format for instance '${instanceLabel}': '${position}'.`);}
    } else {const instanceLabel=String(name||device||rawId||'unknown'); throw new Error(`Missing position for instance '${instanceLabel}'.`);}
    const id=rawId||generateId();
    return {id,name:name||`Inst_${id}`,device:device||'UNKNOWN',type:type||'unknown',side:finalSide,order:finalOrder,...migratedBusinessFields,...rest,meta:{...runtimeMeta,...(Array.isArray(position)?{position}:{})}};
  });
  return {ring_config:json.ring_config,visual_metadata:json.visual_metadata,instances:processedInstances};
};
const exportAdapter = (graph) => {
  const exportedInstances = graph.instances.map(inst => {
    const {side,order,meta,name,device,type,id,...topLevelFields} = inst;
    const {_original_position,position:metaPos} = meta||{};

      const deduped=Array.from(new Set(ids)); if(deduped.length===0)return; const{graph}=get(); const byId=new Map(graph.instances.map(inst=>[inst.id,inst])); const sourceInstances=deduped.map(id=>byId.get(id)).filter(inst=>!!inst); if(sourceInstances.length===0)return; pushHistory();
      const placementOrder=getPlacementOrder(graph);
      const sideInstances=getSideVisualInstances(graph,targetSide);
      const insertIndex=Math.max(0,Math.min(targetOrder,sideInstances.length));
      const newInstances=sourceInstances.map(inst=>({...inst,id:generateId(),side:targetSide,order:1,meta:{...(inst.meta||{})}}));
      const newVis=[...sideInstances]; newVis.splice(insertIndex,0,...newInstances);
      const updatedSide=applySideOrderFromVisual(targetSide,newVis,placementOrder);
      const updatedMap=new Map(updatedSide.map(i=>[i.id,i]));
      const workingInstances=graph.instances.map(inst=>updatedMap.get(inst.id)||inst);
      const finalInstances=[...workingInstances,...newInstances.filter(ni=>!updatedMap.has(ni.id))];
      set({graph:withDerivedRingConfig(normalizeGraphInstances({...graph,instances:finalInstances})),selectedId:newInstances[newInstances.length-1]?.id||null,selectedIds:newInstances.map(i=>i.id)});
    },
  };
});

function getDeviceColor(device, processNode) {
  const d = String(device || '').toUpperCase();
  const colorMap = String(processNode || '').toUpperCase().includes('28') ? T28_DEVICE_COLORS : T180_DEVICE_COLORS;
  // Exact or prefix match against the detailed color map first (handles CORNER/FILLER/RCUT variants)
  if (colorMap[d]) return colorMap[d];
  for (const [prefix, color] of Object.entries(colorMap)) {
    if (d.startsWith(prefix)) return color;
  }
  // Fallbacks for unmatched devices
  if (d.includes('CORNER')) return CORNER_COLOR;
  if (d.includes('FILLER') || d.includes('RCUT') || d === 'BLANK') return FILLER_COLOR;
  return DEFAULT_PAD_COLOR;
}

// ---- PropertyEditorComponent ----
// Matches old PropertyEditor.tsx: flat layout, hidden keys, type as select for T28
function PropertyEditorComponent({ instance, ringConfig, onChange }) {
  const processNode = String(ringConfig?.process_node || 'T180').toUpperCase();
  const isT28 = processNode.includes('28');
  const instType = String(instance.type || '').toLowerCase();
  const instDevice = String(instance.device || '').toUpperCase();
  const isCornerInst = instType === 'corner' || instDevice.includes('CORNER');
  const isFillerInst = isFillerLike(instance);
  const isPadBusiness = !isCornerInst && !isFillerInst;
  const deviceClass = classifyDeviceForProcess(processNode, instDevice);
  const isDigitalDevice = deviceClass === 'digital';
  const normalizedDomain = String(instance.domain || '').toLowerCase();
  const isAnalogDomain = normalizedDomain === 'analog';
  const allowDomain = isPadBusiness && !isT28;
  const allowDirection = isPadBusiness && ((isT28 && isDigitalDevice) || (!isT28 && !isAnalogDomain));

  // Device suggestions filtered by instance type (matching old getSuggestedDevicesByType)
  const T28_CORNER_DEVICES = ['PCORNERA_G', 'PCORNER_G'];
  const T180_CORNER_DEVICES = ['PCORNER'];
  const T28_FILLER_DEVICES = ['PFILLER10A_G','PFILLER20A_G','PFILLER10_G','PFILLER20_G','PRCUTA_G'];
  const T180_FILLER_DEVICES = ['PFILLER10','PFILLER20'];
  const T180_BLANK_DEVICES = ['BLANK'];
  const getSuggestedDevices = () => {
    if (instType === 'corner') return isT28 ? T28_CORNER_DEVICES : T180_CORNER_DEVICES;
    if (instType === 'filler') return isT28 ? T28_FILLER_DEVICES : T180_FILLER_DEVICES;
    if (instType === 'blank') return isT28 ? [] : T180_BLANK_DEVICES;
    return getSupportedDevicesForProcess(processNode);
  };
  const suggestedDevices = getSuggestedDevices();

  // ---- Pin rows local state ----
  const makePinRowId = () => `pr_${Math.random().toString(36).slice(2,9)}`;
  const [pinRows, setPinRows] = useState([]);

  useEffect(() => {
    const pc = instance.pin_connection;
    if (pc && typeof pc === 'object' && !Array.isArray(pc)) {
      setPinRows(prev => Object.entries(pc).map(([pin, entry], i) => ({
        id: (prev[i] && prev[i].pin === pin) ? prev[i].id : makePinRowId(),
        pin,
        label: typeof entry === 'object' ? String(entry.label ?? '') : String(entry ?? ''),
      })));
    } else {
      setPinRows([]);
    }
  }, [instance.pin_connection]);

  const commitPinRows = (rows) => {
    const cfg = {};
    rows.forEach(r => { if (r.pin.trim()) cfg[r.pin.trim()] = { label: r.label }; });
    onChange({ pin_connection: Object.keys(cfg).length ? cfg : undefined });
  };

  const handlePinNameChange = (id, val) => setPinRows(prev => prev.map(r => r.id === id ? { ...r, pin: val } : r));
  const handlePinNameBlur  = (id) => { const rows = pinRows.map(r => r.id === id ? { ...r, pin: r.pin.trim() } : r); setPinRows(rows); commitPinRows(rows); };
  const handlePinLabelChange = (id, label) => { const rows = pinRows.map(r => r.id === id ? { ...r, label } : r); setPinRows(rows); commitPinRows(rows); };
  const handlePinDelete = (id) => { const rows = pinRows.filter(r => r.id !== id); setPinRows(rows); commitPinRows(rows); };
  const handleAddPin = () => { setPinRows(prev => [...prev, { id: makePinRowId(), pin: `PIN_${prev.length + 1}`, label: '' }]); };
  const handleAutoFill = () => {
    const gen = buildPinConfigTemplate({ processNode: ringConfig?.process_node, device: instance.device, instanceName: instance.name, domain: instance.domain, pinConfigProfiles: ringConfig?.pin_connection_profiles });
    if (gen) onChange({ pin_connection: gen });
  };

  // ---- Searchable device dropdown ----
  const [deviceSearch, setDeviceSearch] = useState(null);
  const [deviceOpen, setDeviceOpen] = useState(false);
  const currentSearch = deviceSearch !== null ? deviceSearch : (instance.device || '');
  const filteredDevices = suggestedDevices.filter(d => d.toLowerCase().includes(currentSearch.toLowerCase())).slice(0, 24);

  // ---- Build visible fields in display order (matching old FIELD_DISPLAY_ORDER) ----
  const labelStyle = { fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.8, color: '#6b7280', marginBottom: 4, marginTop: 10 };
  const rowStyle = { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 };
  const labelSpanStyle = { fontSize: 11, color: '#6b7280', width: 80, flexShrink: 0, textAlign: 'right' };
  const inputCls = 'prop-input';
  const selectCls = 'prop-select';

  const fields = [];
  // name
  fields.push(h('div', { key: 'name', style: labelStyle }, 'NAME'),
    h('div', { style: rowStyle },
      h('input', { className: inputCls, style: { flex: 1 }, value: instance.name || '', onChange: e => onChange({ name: e.target.value }) })
    ));
  // device
  fields.push(h('div', { key: 'device', style: labelStyle }, 'DEVICE'),
    h('div', { style: { ...rowStyle, position: 'relative', flex: 1 } },
      h('input', {
        className: inputCls, style: { width: '100%' },
        value: currentSearch, placeholder: 'Type or choose device',
        onFocus: () => { setDeviceSearch(instance.device || ''); setDeviceOpen(true); },
        onBlur:  () => setTimeout(() => { setDeviceOpen(false); setDeviceSearch(null); }, 130),
        onChange: e => { setDeviceSearch(e.target.value); onChange({ device: e.target.value }); setDeviceOpen(true); },
      }),
      deviceOpen && filteredDevices.length > 0 && h('div', {
        style: { position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', border: '1px solid #e5e7eb', borderRadius: 6, zIndex: 50, maxHeight: 140, overflowY: 'auto', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }
      }, ...filteredDevices.map(d => h('div', {
        key: d,
        style: { padding: '6px 10px', cursor: 'pointer', fontSize: 12, color: d === instance.device ? '#2563eb' : '#374151', borderRadius: 4 },
        onMouseDown: e => { e.preventDefault(); onChange({ device: d }); setDeviceSearch(null); setDeviceOpen(false); }
      }, d)))
    ),
    h('div', { style: { fontSize: 10, color: '#9ca3af', marginBottom: 6 } },
      `Suggested devices for ${processNode}/${instType || 'pad'}: ${suggestedDevices.length}`));

  // type — select for T28 pad (pad/inner_pad), text for others
  const useT28PadTypeSelector = isT28 && isPadBusiness;
  fields.push(h('div', { key: 'type', style: labelStyle }, 'TYPE'));
  if (useT28PadTypeSelector) {
    const selectedType = instType === 'inner_pad' ? 'inner_pad' : 'pad';
    fields.push(h('div', { style: rowStyle },
      h('select', { className: selectCls, style: { flex: 1 }, value: selectedType, onChange: e => onChange({ type: e.target.value }) },
        h('option', { value: 'pad' }, 'pad'),
        h('option', { value: 'inner_pad' }, 'inner_pad'))));
  } else {
    fields.push(h('div', { style: rowStyle },
      h('input', { className: inputCls, style: { flex: 1 }, value: instance.type || '', disabled: true })));
  }

  // pin_connection — only for pad business instances
  if (isPadBusiness) {
    const pinLabel = h('div', { key: 'pin_header', style: { ...labelStyle, display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      h('span', null, 'PIN CONNECTION'),
      h('div', { style: { display: 'flex', gap: 5 } },
        h('button', { style: { background: 'none', border: 'none', color: '#2563eb', cursor: 'pointer', fontSize: 10 }, onClick: handleAutoFill }, 'Auto Fill Pins'),
        h('button', { style: { background: 'none', border: 'none', color: '#2563eb', cursor: 'pointer', fontSize: 10 }, onClick: handleAddPin }, '+ Add Pin')
      )
    );
    const processLabel = h('div', { style: { fontSize: 10, color: '#9ca3af', marginBottom: 4 } },
      'Process: ', h('span', { style: { fontWeight: 600, color: '#374151' } }, processNode),
      ` (${supportedProcessNodes().join(', ')})`
    );
    const pinRowElems = pinRows.map(row =>
      h('div', { key: row.id, className: 'pin-row' },
        h('input', { className: 'pin-input', value: row.pin, style: { width: 64, fontFamily: 'monospace', color: '#374151' },
          onChange: e => handlePinNameChange(row.id, e.target.value), onBlur: () => handlePinNameBlur(row.id) }),
        h('input', { className: 'pin-input', value: row.label, style: { flex: 1 },
          onChange: e => handlePinLabelChange(row.id, e.target.value) }),
        h('button', { className: 'pin-del-btn', onClick: () => handlePinDelete(row.id) }, '×')
      )
    );
    const noPins = pinRows.length === 0 ? h('div', { style: { color: '#9ca3af', fontSize: 11, padding: '4px 0' } }, 'No pin connections') : null;
    fields.push(pinLabel, processLabel, ...pinRowElems, noPins);
  }

  // domain — only for T180 pad instances
  if (allowDomain) {
    fields.push(h('div', { key: 'domain', style: labelStyle }, 'DOMAIN'),
      h('div', { style: rowStyle },
        h('select', { className: selectCls, style: { flex: 1 }, value: instance.domain || '', onChange: e => onChange({ domain: e.target.value === '' ? null : e.target.value }) },
          h('option', { value: '' }, 'null'),
          h('option', { value: 'digital' }, 'digital'),
          h('option', { value: 'analog' }, 'analog'))));
  }

  // direction — only when allowed
  if (allowDirection) {
    const rawDir = typeof instance.direction === 'string' ? instance.direction.toLowerCase() : '';
    const normDir = (rawDir === 'input' || rawDir === 'output') ? rawDir : '';
    fields.push(h('div', { key: 'direction', style: labelStyle }, 'DIRECTION'),
      h('div', { style: rowStyle },
        h('select', { className: selectCls, style: { flex: 1 }, value: normDir, onChange: e => onChange({ direction: e.target.value === '' ? undefined : e.target.value }) },
          h('option', { value: '' }, 'unset'),
          h('option', { value: 'input' }, 'input'),
          h('option', { value: 'output' }, 'output'))));
  }

  return h('div', null, ...fields);
}

// Matches old PropertyEditor.tsx ring config view: CHIP SIZE, SIDE COUNTS, placement_order
function RingConfigEditorComponent({ ringConfig, onChange }) {
  // Resolve chip size keys
  const widthKey = ringConfig && ringConfig.chip_width !== undefined ? 'chip_width' : 'width';
  const heightKey = ringConfig && ringConfig.chip_height !== undefined ? 'chip_height' : 'height';
  const hasChipSize = ringConfig && ringConfig[widthKey] !== undefined && ringConfig[heightKey] !== undefined;

  // Resolve side count keys
  const sideCountPatternA = ['top_count','right_count','bottom_count','left_count'];
  const sideCountPatternB = ['num_pads_top','num_pads_right','num_pads_bottom','num_pads_left'];
  let hasSideCounts = false;
  let sideCountLabels = {};
  if (ringConfig && sideCountPatternA.every(k => ringConfig[k] !== undefined)) {
    hasSideCounts = true;
    sideCountLabels = { top: 'top_count', right: 'right_count', bottom: 'bottom_count', left: 'left_count' };
  } else if (ringConfig && sideCountPatternB.every(k => ringConfig[k] !== undefined)) {
    hasSideCounts = true;
    sideCountLabels = { top: 'num_pads_top', right: 'num_pads_right', bottom: 'num_pads_bottom', left: 'num_pads_left' };
  }

  const [chipSizeInput, setChipSizeInput] = useState('');
  useEffect(() => {
    if (hasChipSize) setChipSizeInput(`${ringConfig[widthKey]} * ${ringConfig[heightKey]}`);
  }, [ringConfig && ringConfig[widthKey], ringConfig && ringConfig[heightKey]]);

  const handleChipSizeChange = (val) => {
    setChipSizeInput(val);
    const parts = val.split('*');
    if (parts.length === 2) {
      const w = parseFloat(parts[0].trim());
      const h = parseFloat(parts[1].trim());
      if (!isNaN(w) && !isNaN(h)) {
        const updated = { [widthKey]: w, [heightKey]: h };
        onChange(updated);
      }
    }
  };

  const sectionLabel = { fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.8, color: '#6b7280', marginBottom: 4, marginTop: 10 };

  return h('div', null,
    // CHIP SIZE
    hasChipSize && h('div', { style: { marginBottom: 10 } },
      h('div', { style: sectionLabel }, 'CHIP SIZE'),
      h('input', { className: 'prop-input', style: { width: '100%' }, value: chipSizeInput,
        placeholder: 'Width * Height', onChange: e => handleChipSizeChange(e.target.value) })
    ),

    // SIDE COUNTS (2x2 disabled grid matching old editor)
    hasSideCounts && h('div', { style: { marginBottom: 10 } },
      h('div', { style: sectionLabel }, 'SIDE COUNTS'),
      h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, padding: 6, border: '1px solid #e5e7eb', borderRadius: 6, background: '#f9fafb' } },
        ['top','right','bottom','left'].map(side =>
          h('div', { key: side, style: { display: 'flex', flexDirection: 'column', alignItems: 'center' } },
            h('span', { style: { fontSize: 9, color: '#9ca3af', textTransform: 'uppercase' } }, side),
            h('input', { type: 'number', disabled: true, value: ringConfig[sideCountLabels[side]] || 0,
              style: { width: '100%', padding: '2px 4px', fontSize: 11, textAlign: 'center', background: '#f3f4f6', border: '1px solid #e5e7eb', borderRadius: 4, color: '#374151' } })
          )
        )
      )
    ),

    // Process Node
    h('div', { style: { marginBottom: 10 } },
      h('div', { style: sectionLabel }, 'PROCESS NODE'),
      h('select', { className: 'prop-select', style: { width: '100%' }, value: ringConfig.process_node || 'T180',
        onChange: e => onChange({ process_node: e.target.value }) },
        h('option', { value: 'T180' }, 'T180'),
        h('option', { value: 'T28' }, 'T28'))
    ),

    // Placement Order
    h('div', { style: { marginBottom: 10 } },
      h('div', { style: sectionLabel }, 'PLACEMENT ORDER'),
      h('select', { className: 'prop-select', style: { width: '100%' }, value: ringConfig.placement_order || 'counterclockwise',
        onChange: e => onChange({ placement_order: e.target.value }) },
        h('option', { value: 'clockwise' }, 'clockwise'),
        h('option', { value: 'counterclockwise' }, 'counterclockwise'))
    ),

    // Width / Height (editable, matching old editor)
    h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 10 } },
      h('div', null,
        h('div', { style: sectionLabel }, 'WIDTH'),
        h('input', { className: 'prop-input', type: 'number', style: { width: '100%' },
          value: ringConfig.width || '', placeholder: '-',
          onChange: e => onChange({ width: e.target.value ? Number(e.target.value) : undefined }) })
      ),
      h('div', null,
        h('div', { style: sectionLabel }, 'HEIGHT'),
        h('input', { className: 'prop-input', type: 'number', style: { width: '100%' },
          value: ringConfig.height || '', placeholder: '-',
          onChange: e => onChange({ height: e.target.value ? Number(e.target.value) : undefined }) })
      )
    ),

    // Starting Side
    ringConfig.starting_side !== undefined && h('div', { style: { marginBottom: 10 } },
      h('div', { style: sectionLabel }, 'STARTING SIDE'),
      h('select', { className: 'prop-select', style: { width: '100%' }, value: ringConfig.starting_side || 'top',

        h('option', { value: 'right' }, 'right'),
        h('option', { value: 'bottom' }, 'bottom'),
        h('option', { value: 'left' }, 'left'))
    )
  );

  const handleSaveRef = useRef(null);

  const selectedInstance = selectedId ? graph.instances.find(i => i.id === selectedId) : null;

  // Compute compatible-pin-batch IDs (multi-select instances with same pin-name set)
  const supportsPinBatch = (inst) => {
    if (!inst) return false;
    const t = String(inst.type || '').toLowerCase();
    const d = String(inst.device || '').toUpperCase();
    return t !== 'corner' && t !== 'filler' && t !== 'blank' && t !== 'cut' &&
           !d.includes('CORNER') && !d.includes('FILLER') && !d.includes('RCUT') && d !== 'BLANK';
  };
  const pinSig = (inst) => {
    const pc = inst && inst.pin_connection;
    if (!pc || typeof pc !== 'object' || Array.isArray(pc)) return null;
    return JSON.stringify(Object.keys(pc).sort());
  };
  const targetSig = selectedInstance ? pinSig(selectedInstance) : null;
  const compatiblePinBatchIds = (selectedInstance && supportsPinBatch(selectedInstance) && selectedIds.length > 1 && targetSig)
    ? selectedIds.filter(id => { const inst = graph.instances.find(i => i.id === id); return inst && supportsPinBatch(inst) && pinSig(inst) === targetSig; })
    : [];

  useEffect(() => {
    const d = selectedInstance ? { ...selectedInstance } : null;
    setLocalData(d); localDataRef.current = d;
    setIsDirty(false); isDirtyRef.current = false;
  }, [selectedId, graph.instances]);

  useEffect(() => { isDirtyRef.current = isDirty; }, [isDirty]);
  useEffect(() => { localDataRef.current = localData; }, [localData]);

  // Updated every render so the event listener always has fresh closures
  handleSaveRef.current = () => {
    if (!isDirtyRef.current) return;
    const draft = localDataRef.current;
    if (!draft || !selectedId) return;
    const sourceInst = graph.instances.find(i => i.id === selectedId);
    const sourcePin = sourceInst ? sourceInst.pin_connection : undefined;
    const draftPin  = draft.pin_connection;
    const pinChanged = JSON.stringify(normalizePinConfig(sourcePin)) !== JSON.stringify(normalizePinConfig(draftPin));
    if (pinChanged && compatiblePinBatchIds.length > 1) {
      updateInstancesPinConnection(compatiblePinBatchIds, draftPin);
      const withoutPin = { ...draft }; delete withoutPin.pin_connection;
      updateInstance(selectedId, withoutPin);
    } else {
      updateInstance(selectedId, draft);
    }
    setIsDirty(false); isDirtyRef.current = false;
  };

  // Auto-save when user clicks outside the inspector panel
  useEffect(() => {
    const onOutside = (e) => {
      if (!isDirtyRef.current) return;
      if (panelRef.current && !panelRef.current.contains(e.target))
        setTimeout(() => { if (handleSaveRef.current) handleSaveRef.current(); }, 0);
    };
    document.addEventListener('pointerdown', onOutside, true);
    return () => document.removeEventListener('pointerdown', onOutside, true);
  }, []);

  const handleInstanceChange = (partial) => { setLocalData(prev => ({ ...prev, ...partial })); setIsDirty(true); };
  const handleSave = () => { if (handleSaveRef.current) handleSaveRef.current(); };

  return h('div', { className: `inspector-panel${collapsed ? ' collapsed' : ''}`, ref: panelRef },
    h('div', { className: 'inspector-header' },
      !collapsed && h('span', null, selectedInstance ? 'Instance Properties' : 'Ring Config'),
      !collapsed && selectedIds.length > 1 && h('span', { style: { fontSize: 10, color: '#6b7280' } },
        `${selectedIds.length} sel${compatiblePinBatchIds.length > 1 ? ` · ${compatiblePinBatchIds.length} pin-batch` : ''}`),
      h('button', {
        className: 'inspector-toggle',
        title: collapsed ? 'Expand panel' : 'Collapse panel',
        onClick: () => setCollapsed(c => !c),
        style: { marginLeft: 'auto' }
      }, collapsed ? '▶' : '◀')
    ),
    h('div', { className: 'inspector-body' },
      selectedInstance && localData
        ? h(PropertyEditorComponent, { instance: localData, ringConfig: graph.ring_config, onChange: handleInstanceChange })
        : h(RingConfigEditorComponent, { ringConfig: graph.ring_config, onChange: partial => updateRingConfig(partial) })
    ),
    selectedInstance && h('button', {
      className: `save-btn ${isDirty ? 'dirty' : 'clean'}`,
      onClick: isDirty ? handleSave : undefined,
      disabled: !isDirty
    }, isDirty ? 'Save Changes' : 'No Changes')
  );
}

// ---- ContextMenuComponent ----
function ContextMenuComponent({ x, y, items, onClose }) {
  const menuRef = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);
  return h('div', { ref: menuRef, className: 'context-menu', style: { left: x, top: y } },
    ...items.map((item, i) =>
      item.separator
        ? h('div', { key: `sep-${i}`, className: 'context-menu-separator' })
        : h('div', {
            key: item.key || item.label,
            className: `context-menu-item${item.danger ? ' danger' : ''}`,
            onClick: () => { item.action(); onClose(); }
          },
          item.icon || '',
          h('span', null, item.label),
          item.shortcut && h('span', { className: 'context-menu-shortcut' }, item.shortcut)
        )
    )
  );
}

// ---- RingCanvasComponent ----
function RingCanvasComponent() {
  const { graph, selectedIds, selectInstance, selectInstances, clearSelection, moveInstance, moveInstances, copyInstancesToSide, deleteInstances, copySelection, pasteInstance } = useIORingStore();
  const svgRef = useRef(null);
  const [viewBox, setViewBox] = useState({ x: -50, y: -50, w: 1200, h: 900 });
  const [isPanning, setIsPanning] = useState(false);
  const [panStart, setPanStart] = useState(null);
  const [dragState, setDragState] = useState(null);
  const [boxSel, setBoxSel] = useState(null);
  const [contextMenu, setContextMenu] = useState(null);
  const [hoverTooltip, setHoverTooltip] = useState(null);
  const [legendVisible, setLegendVisible] = useState(true);
  const [canvasWidth, setCanvasWidth] = useState(0);
  const canvasAreaRef = useRef(null);

  const DEFAULT_SCALE = 0.6;

  // Track canvas width for responsive legend
  useEffect(() => {
    if (!canvasAreaRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const entry of entries) {
        const w = entry.contentRect.width;
        setCanvasWidth(w);
        if (w < 600 && legendVisible) setLegendVisible(false);
      }
    });
    ro.observe(canvasAreaRef.current);
    return () => ro.disconnect();
  }, []);
  const processNode = graph.ring_config?.process_node || 'T180';
  const isT28Node = String(processNode).toUpperCase().includes('28');
  const dims = graph.visual_metadata?.dimensions || {};
  const rawPadH = toPositiveNumber(dims.pad_height || graph.ring_config?.pad_height, isT28Node ? 110 : 120);
  const SIDE_THICKNESS = rawPadH * DEFAULT_SCALE;
  const rawCornerSize = toPositiveNumber(dims.corner_size || graph.ring_config?.corner_size, isT28Node ? 110 : 130);
  const cornerSize = rawCornerSize * DEFAULT_SCALE;

  const getInstWidth = (inst) => inferPerimeterWidth(inst, graph.ring_config) * DEFAULT_SCALE;

  const corners = { top_left: null, top_right: null, bottom_left: null, bottom_right: null };
  graph.instances.forEach(inst => {
    if (inst.side === 'corner') {
      const loc = resolveCornerLocation(inst);
      if (loc) corners[loc] = inst;
    }
  });

  const cTL = corners.top_left ? getInstWidth(corners.top_left) : cornerSize;
  const cTR = corners.top_right ? getInstWidth(corners.top_right) : cornerSize;
  const cBL = corners.bottom_left ? getInstWidth(corners.bottom_left) : cornerSize;
  const cBR = corners.bottom_right ? getInstWidth(corners.bottom_right) : cornerSize;

  const topInstances = getSideVisualInstances(graph, 'top');
  const bottomInstances = getSideVisualInstances(graph, 'bottom');
  const leftInstances = getSideVisualInstances(graph, 'left');
  const rightInstances = getSideVisualInstances(graph, 'right');

  const topWidth = topInstances.reduce((s, i) => s + getInstWidth(i), 0);
  const bottomWidth = bottomInstances.reduce((s, i) => s + getInstWidth(i), 0);
  const leftHeight = leftInstances.reduce((s, i) => s + getInstWidth(i), 0);
  const rightHeight = rightInstances.reduce((s, i) => s + getInstWidth(i), 0);

  const chipW = Math.max(topWidth + cTL + cTR, bottomWidth + cBL + cBR, 300);
  const chipH = Math.max(leftHeight + cTL + cBL, rightHeight + cTR + cBR, 200);

  const outerX = 0, outerY = 0;
  const outerW = chipW, outerH = chipH;
  const innerX = SIDE_THICKNESS, innerY = SIDE_THICKNESS;
  const innerW = chipW - 2 * SIDE_THICKNESS, innerH = chipH - 2 * SIDE_THICKNESS;

  // Build rects for each instance
  const instRects = [];

  // Corners — sized by actual corner dimensions (matching old editor)
  const cornerDefs = [
    { loc: 'top_left', x: outerX, y: outerY, w: cTL, h: cTL },
    { loc: 'top_right', x: outerX + outerW - cTR, y: outerY, w: cTR, h: cTR },
    { loc: 'bottom_left', x: outerX, y: outerY + outerH - cBL, w: cBL, h: cBL },
    { loc: 'bottom_right', x: outerX + outerW - cBR, y: outerY + outerH - cBR, w: cBR, h: cBR },
  ];
  cornerDefs.forEach(({ loc, x, y, w, h }) => {
    const inst = corners[loc];
    if (inst) instRects.push({ inst, x, y, w, h, isCorner: true });
    else instRects.push({ inst: null, x, y, w, h, isCorner: true, loc });
  });

  // Top side — pads start right after top-left corner
  let topCursor = outerX + cTL;
  topInstances.forEach(inst => {
    const iw = getInstWidth(inst);
    instRects.push({ inst, x: topCursor, y: outerY, w: iw, h: SIDE_THICKNESS, isTop: true });
    topCursor += iw;
  });

  // Bottom side
  let bottomCursor = outerX + cBL;
  bottomInstances.forEach(inst => {
    const iw = getInstWidth(inst);
    instRects.push({ inst, x: bottomCursor, y: outerY + outerH - SIDE_THICKNESS, w: iw, h: SIDE_THICKNESS, isBottom: true });
    bottomCursor += iw;
  });

  // Left side
  let leftCursor = outerY + cTL;
  leftInstances.forEach(inst => {
    const iw = getInstWidth(inst);
    instRects.push({ inst, x: outerX, y: leftCursor, w: SIDE_THICKNESS, h: iw, isLeft: true });
    leftCursor += iw;
  });

  // Right side
  let rightCursor = outerY + cTR;
  rightInstances.forEach(inst => {
    const iw = getInstWidth(inst);
    instRects.push({ inst, x: outerX + outerW - SIDE_THICKNESS, y: rightCursor, w: SIDE_THICKNESS, h: iw, isRight: true });
    rightCursor += iw;
  });

  const svgToClient = (svgX, svgY) => {
    const svg = svgRef.current;
    if (!svg) return { x: 0, y: 0 };
    const ctm = svg.getScreenCTM();
    return { x: svgX * ctm.a + ctm.e, y: svgY * ctm.d + ctm.f };
  };

  const clientToSvg = (clientX, clientY) => {
    const svg = svgRef.current;
    if (!svg) return { x: 0, y: 0 };
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    return { x: svgPt.x, y: svgPt.y };
  };

  const onWheel = (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.1 : 0.9;
    const mouse = clientToSvg(e.clientX, e.clientY);
    setViewBox(vb => {
      const newW = vb.w * factor;
      const newH = vb.h * factor;
      const newX = mouse.x - (mouse.x - vb.x) * factor;
      const newY = mouse.y - (mouse.y - vb.y) * factor;
      return { x: newX, y: newY, w: newW, h: newH };
    });
  };

  const onMouseDown = (e) => {
    if (contextMenu) { setContextMenu(null); return; }
    if (e.button === 1) {
      e.preventDefault();
      setIsPanning(true);
      setPanStart({ x: e.clientX, y: e.clientY, vb: { ...viewBox } });
      return;
    }
    if (e.button === 0 && (e.target === svgRef.current || e.target.classList.contains('canvas-bg'))) {
      // Start box selection
      const svgPt = clientToSvg(e.clientX, e.clientY);
      setBoxSel({ x0: svgPt.x, y0: svgPt.y, x1: svgPt.x, y1: svgPt.y });
      if (!e.ctrlKey && !e.shiftKey) clearSelection();
    }
  };

  const onContextMenu = (e) => { e.preventDefault(); };

  const onMouseMove = (e) => {
    if (isPanning && panStart) {
      const dx = (e.clientX - panStart.x) / (svgRef.current?.clientWidth || 1) * panStart.vb.w;
      const dy = (e.clientY - panStart.y) / (svgRef.current?.clientHeight || 1) * panStart.vb.h;
      setViewBox({ ...panStart.vb, x: panStart.vb.x - dx, y: panStart.vb.y - dy });
      return;
    }
    if (boxSel) {
      const svgPt = clientToSvg(e.clientX, e.clientY);
      setBoxSel(bs => bs ? { ...bs, x1: svgPt.x, y1: svgPt.y } : null);
    }
  };

  const onMouseUp = (e) => {
    if (isPanning) { setIsPanning(false); setPanStart(null); return; }
    if (boxSel) {
      const bx0 = Math.min(boxSel.x0, boxSel.x1);
      const bx1 = Math.max(boxSel.x0, boxSel.x1);
      const by0 = Math.min(boxSel.y0, boxSel.y1);
      const by1 = Math.max(boxSel.y0, boxSel.y1);
      if (bx1 - bx0 > 5 || by1 - by0 > 5) {
        const hitIds = instRects
          .filter(r => r.inst && r.x + r.w > bx0 && r.x < bx1 && r.y + r.h > by0 && r.y < by1)
          .map(r => r.inst.id);
        if (hitIds.length) selectInstances(hitIds, e.ctrlKey || e.shiftKey);
      }
      setBoxSel(null);
    }
  };

  // Compute insertion indicator from mouse SVG position
  const computeDropTarget = (svgX, svgY, draggedIds) => {
    const distTop = Math.abs(svgY - (outerY + SIDE_THICKNESS / 2));
    const distBottom = Math.abs(svgY - (outerY + outerH - SIDE_THICKNESS / 2));
    const distLeft = Math.abs(svgX - (outerX + SIDE_THICKNESS / 2));
    const distRight = Math.abs(svgX - (outerX + outerW - SIDE_THICKNESS / 2));
    const minDist = Math.min(distTop, distBottom, distLeft, distRight);
    let newSide = 'top';
    if (minDist === distBottom) newSide = 'bottom';
    else if (minDist === distLeft) newSide = 'left';
    else if (minDist === distRight) newSide = 'right';

    // Compute total ghost width for all dragged instances
    const dragInsts = graph.instances.filter(i => draggedIds.includes(i.id));
    const ghostTotalW = dragInsts.reduce((s, i) => s + getInstWidth(i), 0);

    let newOrder = 0;
    let insertX, insertY;
    if (newSide === 'top') {
      const rel = svgX - (outerX + cTL);
      let acc = 0; newOrder = 0;
      for (let i = 0; i < topInstances.length; i++) { acc += getInstWidth(topInstances[i]); if (rel < acc) { newOrder = i; break; } newOrder = i + 1; }
      insertX = outerX + cTL + topInstances.slice(0, newOrder).reduce((s, i) => s + getInstWidth(i), 0);
      insertY = outerY;
    } else if (newSide === 'bottom') {
      const rel = svgX - (outerX + cBL);
      let acc = 0; newOrder = 0;
      for (let i = 0; i < bottomInstances.length; i++) { acc += getInstWidth(bottomInstances[i]); if (rel < acc) { newOrder = i; break; } newOrder = i + 1; }
      insertX = outerX + cBL + bottomInstances.slice(0, newOrder).reduce((s, i) => s + getInstWidth(i), 0);
      insertY = outerY + outerH - SIDE_THICKNESS;
    } else if (newSide === 'left') {
      const rel = svgY - (outerY + cTL);
      let acc = 0; newOrder = 0;
      for (let i = 0; i < leftInstances.length; i++) { acc += getInstWidth(leftInstances[i]); if (rel < acc) { newOrder = i; break; } newOrder = i + 1; }
      insertX = outerX;
      insertY = outerY + cTL + leftInstances.slice(0, newOrder).reduce((s, i) => s + getInstWidth(i), 0);
    } else {
      const rel = svgY - (outerY + cTR);
      let acc = 0; newOrder = 0;
      for (let i = 0; i < rightInstances.length; i++) { acc += getInstWidth(rightInstances[i]); if (rel < acc) { newOrder = i; break; } newOrder = i + 1; }
      insertX = outerX + outerW - SIDE_THICKNESS;
      insertY = outerY + cTR + rightInstances.slice(0, newOrder).reduce((s, i) => s + getInstWidth(i), 0);
    }
    return { newSide, newOrder, insertX, insertY, ghostTotalW, isHorizontal: newSide === 'top' || newSide === 'bottom' };
  };

  const onInstMouseDown = (e, inst) => {
    if (e.button === 2) return; // handled by onContextMenu
    if (e.button !== 0) return;
    e.stopPropagation();

    // Alt+click on another instance: copy selected to that instance's side at that position
    if (e.altKey && selectedIds.length > 0 && !selectedIds.includes(inst.id)) {
      const targetSide = inst.side;
      const sideInsts = getSideVisualInstances(graph, targetSide);
      const idx = sideInsts.findIndex(i => i.id === inst.id);
      copyInstancesToSide(selectedIds, targetSide, idx >= 0 ? idx + 1 : sideInsts.length);
      return;
    }

    // Only change selection if NOT already part of multi-selection (otherwise drag loses the group)
    const alreadySelected = selectedIds.includes(inst.id);
    if (e.ctrlKey || e.shiftKey) {
      selectInstance(inst.id, true); // toggle additive
    } else if (!alreadySelected) {
      selectInstance(inst.id, false); // single select
    }
    // If already selected and no modifier: keep current selection intact for group drag

    const startSvgPt = clientToSvg(e.clientX, e.clientY);
    setDragState({
      id: inst.id, side: inst.side, startX: startSvgPt.x, startY: startSvgPt.y,
      moved: false, isCopy: e.altKey || false, selectedIds: useIORingStore.getState().selectedIds,
      dropTarget: null,
    });
  };

  const onInstContextMenu = (e, inst) => {
    e.preventDefault();
    e.stopPropagation();
    if (!selectedIds.includes(inst.id)) {
      selectInstance(inst.id, false);
    }
    const currentSelected = useIORingStore.getState().selectedIds;
    const isMulti = currentSelected.length > 1;
    const menuItems = [
      { label: 'Copy', key: 'copy', shortcut: 'Ctrl+C', action: () => copySelection(currentSelected) },
      { label: 'Paste', key: 'paste', shortcut: 'Ctrl+V', action: () => pasteInstance(inst.side) },
      { separator: true },
      { label: `Move to Top`, key: 'move-top', action: () => moveInstances(currentSelected, 'top', 0) },
      { label: `Move to Bottom`, key: 'move-bottom', action: () => moveInstances(currentSelected, 'bottom', 0) },
      { label: `Move to Left`, key: 'move-left', action: () => moveInstances(currentSelected, 'left', 0) },
      { label: `Move to Right`, key: 'move-right', action: () => moveInstances(currentSelected, 'right', 0) },
      { separator: true },
      { label: `Copy to Top`, key: 'copy-top', action: () => copyInstancesToSide(currentSelected, 'top', getSideVisualInstances(graph, 'top').length) },
      { label: `Copy to Bottom`, key: 'copy-bottom', action: () => copyInstancesToSide(currentSelected, 'bottom', getSideVisualInstances(graph, 'bottom').length) },
      { label: `Copy to Left`, key: 'copy-left', action: () => copyInstancesToSide(currentSelected, 'left', getSideVisualInstances(graph, 'left').length) },
      { label: `Copy to Right`, key: 'copy-right', action: () => copyInstancesToSide(currentSelected, 'right', getSideVisualInstances(graph, 'right').length) },
      { separator: true },
      { label: `Delete${isMulti ? ` (${currentSelected.length})` : ''}`, key: 'delete', shortcut: 'Del', danger: true, action: () => deleteInstances(currentSelected) },
    ];
    setContextMenu({ x: e.clientX, y: e.clientY, items: menuItems });
  };

  useEffect(() => {
    if (!dragState) return;
    const onMove = (e) => {
      const svgPt = clientToSvg(e.clientX, e.clientY);
      const dx = svgPt.x - dragState.startX;
      const dy = svgPt.y - dragState.startY;
      if (!dragState.moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        setDragState(ds => ({ ...ds, moved: true, isCopy: e.altKey }));
      }
      if (dragState.moved || (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        const allDragged = dragState.selectedIds.length > 1 && dragState.selectedIds.includes(dragState.id) ? dragState.selectedIds : [dragState.id];
        const target = computeDropTarget(svgPt.x, svgPt.y, allDragged);
        setDragState(ds => ds ? ({ ...ds, isCopy: e.altKey, dropTarget: target }) : ds);
      }
    };
    const onUp = (e) => {
      if (dragState.moved) {
        const svgPt = clientToSvg(e.clientX, e.clientY);
        const allDragged = dragState.selectedIds.length > 1 && dragState.selectedIds.includes(dragState.id) ? dragState.selectedIds : [dragState.id];
        const { newSide, newOrder } = computeDropTarget(svgPt.x, svgPt.y, allDragged);
        const isCopy = e.altKey || dragState.isCopy;
        const allSelected = dragState.selectedIds;

        if (isCopy) {
          // Alt+drag: copy selected instances to target side
          const { copySelection, pasteInstance } = useIORingStore.getState();
          copySelection(allSelected.length > 1 && allSelected.includes(dragState.id) ? allSelected : [dragState.id]);
          pasteInstance(newSide);
          // Paste always appends at end; we need to move to the right order
          const { selectedIds } = useIORingStore.getState();
          if (selectedIds.length > 0) {
            moveInstances(selectedIds, newSide, newOrder);
          }
        } else {
          if (allSelected.length > 1 && allSelected.includes(dragState.id)) {
            moveInstances(allSelected, newSide, newOrder);
          } else {
            moveInstance(dragState.id, newSide, newOrder);
          }
        }
      }
      setDragState(null);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [dragState]);

  const vbStr = `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`;
  const selectedSet = new Set(selectedIds);

  // Grouped legend matching RingCanvas.tsx
  const isT28Legend = String(processNode || '').includes('28');
  const legendGroups = isT28Legend ? [
    { title: 'Analog IO (Blue)', items: [
      { label: 'PDB3AC', color: '#4A90E2' }, { label: 'PVDD1AC', color: '#5BA0F2' },
      { label: 'PVSS1AC', color: '#3A80D2' }, { label: 'PVDD1A', color: '#6DB0F5' },
      { label: 'PVSS1A', color: '#4E8EE0' }, { label: 'PVSS2A', color: '#5F9EC0' },
      { label: 'PVDD3AC', color: '#87CEEB' }, { label: 'PVSS3AC', color: '#4682B4' },
      { label: 'PVDD3A', color: '#7EC8E3' }, { label: 'PVSS3A', color: '#3E7AB0' },
    ]},
    { title: 'Digital IO (Green)', items: [
      { label: 'PDDW16SDGZ', color: '#32CD32' }, { label: 'PRUW08SDGZ', color: '#3CB371' },
      { label: 'PVDD1DGZ', color: '#90EE90' }, { label: 'PVDD2POC', color: '#90EE90' },
      { label: 'PVSS1DGZ', color: '#228B22' }, { label: 'PVSS2DGZ', color: '#228B22' },
    ]},
    { title: 'Corners / Fillers / CUT', items: [
      { label: 'PCORNERA_G', color: '#FF6B6B' }, { label: 'PCORNER_G', color: '#FF8888' },
      { label: 'PFILLER10A_G', color: '#D8D8D8' }, { label: 'PFILLER20A_G', color: '#D8D8D8' },
      { label: 'PFILLER10_G', color: '#C0C0C0' }, { label: 'PFILLER20_G', color: '#C0C0C0' },
      { label: 'PRCUTA_G (CUT)', color: '#A0A0A0' },
    ]},
  ] : [
    { title: 'Digital IO (Green)', items: [
      { label: 'PVDD1CDG', color: '#32CD32' }, { label: 'PVSS1CDG', color: '#228B22' },
      { label: 'PVDD2CDG', color: '#90EE90' }, { label: 'PVSS2CDG', color: '#228B22' },
    ]},
    { title: 'Analog IO (Blue)', items: [
      { label: 'PVDD1ANA', color: '#4A90E2' }, { label: 'PVSS1ANA', color: '#3A80D2' },
      { label: 'PVDD2ANA', color: '#5BA0F2' }, { label: 'PVSS2ANA', color: '#3A80D2' },
    ]},
    { title: 'Corners / Fillers', items: [
      { label: 'PCORNER', color: '#FF6B6B' }, { label: 'PFILLER10', color: '#C0C0C0' },
      { label: 'PFILLER20', color: '#C0C0C0' }, { label: 'blank', color: '#FF0000' },
    ]},
  ];

  const renderInstRect = (rectData, idx) => {
    const { inst, x, y, w, h: rh, isCorner, loc } = rectData;
    if (!inst) {
      // Empty corner placeholder
      return h('rect', {
        key: `empty-corner-${loc}`, x, y, width: w, height: rh,
        fill: '#eeeeee', stroke: '#cccccc', strokeWidth: 1,
        strokeDasharray: '4', rx: 4
      });
    }
    const color = getDeviceColor(inst.device, processNode);
    const isSelected = selectedSet.has(inst.id);
    const isDragging = dragState?.id === inst.id && dragState?.moved;
    const isPartOfDragSelection = dragState?.moved && dragState?.selectedIds?.includes(inst.id);
    const instTypeLower = String(inst.type || '').toLowerCase();
    const isFillerInst = instTypeLower === 'filler' || instTypeLower === 'blank'
      || String(inst.device || '').toUpperCase().includes('FILLER')
      || String(inst.device || '').toUpperCase().includes('RCUT');
    const isCornerInst = instTypeLower === 'corner' || String(inst.device || '').toUpperCase().includes('CORNER');

    // Label: match old editor — "name:device" for IO pads, device/name for corner/filler
    let labelText;
    if (isCornerInst || isFillerInst) {
      labelText = inst.device || inst.name || 'UNKNOWN';
    } else {
      let sigName = String(inst.name || '');
      sigName = sigName.replace(/_(left|right|top|bottom)_\d+$/, '');
      labelText = `${sigName}:${inst.device || 'UNKNOWN'}`;
    }

    // Font size matching old editor
    const isT28 = String(processNode || '').includes('28');
    const baseFontSize = isCornerInst ? (isT28 ? 6 : 8) : isFillerInst ? (isT28 ? 4.5 : 6) : (isT28 ? 5.5 : 7);
    const fontSize = Math.max(4, Math.min(baseFontSize, Math.max(4, Math.min(w, rh) * 0.42)));

    // Stroke: dashed for fillers/blanks
    const strokeColor = isSelected ? 'blue' : 'black';
    const strokeWidth = isSelected ? 3 : 2;
    const strokeDash = isFillerInst ? '4 2' : undefined;

    // Text: dark ink with white outline (same as old editor)
    const textStyle = {
      fontSize: `${fontSize}px`,
      fill: '#111827',
      stroke: 'rgba(255,255,255,0.92)',
      strokeWidth: 0.9,
      paintOrder: 'stroke fill',
      textRendering: 'geometricPrecision',
      fontWeight: 600,
      userSelect: 'none',
      pointerEvents: 'none',
    };

    let textEl;
    if (isCornerInst || w >= rh) {
      textEl = h('text', {
        x: x + w / 2, y: y + rh / 2,
        textAnchor: 'middle', dy: '.3em',
        style: textStyle
      }, labelText);
    } else {
      textEl = h('text', {
        x: x + w / 2, y: y + rh / 2,
        textAnchor: 'middle', dy: '.3em',
        transform: `rotate(90, ${x + w / 2}, ${y + rh / 2})`,
        style: textStyle
      }, labelText);
    }

    return h('g', {
      key: inst.id,
      onMouseDown: e => onInstMouseDown(e, inst),
      onContextMenu: e => onInstContextMenu(e, inst),
      onDoubleClick: () => { selectInstance(inst.id, false); },
      onMouseEnter: e => setHoverTooltip({ inst, x: e.clientX, y: e.clientY }),
      onMouseLeave: () => setHoverTooltip(null),
      style: { cursor: isDragging || isPartOfDragSelection ? (dragState?.isCopy ? 'copy' : 'grabbing') : 'pointer', opacity: isDragging ? 0.4 : isPartOfDragSelection ? 0.5 : 1 }
    },
      // Selection glow effect
      isSelected && h('rect', {
        x: x - 2, y: y - 2, width: w + 4, height: rh + 4,
        fill: 'none', stroke: '#3b82f6', strokeWidth: 1.5,
        strokeOpacity: 0.5, rx: 2, pointerEvents: 'none'
      }),
      h('rect', {
        x, y, width: w, height: rh,
        fill: color, fillOpacity: 0.8,
        stroke: strokeColor, strokeWidth,
        strokeDasharray: strokeDash
      }),
      textEl
    );
  };

  return h('div', { className: 'canvas-area', ref: canvasAreaRef },
    h('svg', {
      ref: svgRef,
      className: 'canvas-svg',
      viewBox: vbStr,
      onWheel,
      onMouseDown,
      onMouseMove,
      onMouseUp,
      onContextMenu,
      style: { cursor: isPanning ? 'grabbing' : 'default' }
    },
      // Background: white with subtle grid
      h('rect', { className: 'canvas-bg', x: viewBox.x, y: viewBox.y, width: viewBox.w, height: viewBox.h, fill: 'white' }),
      h('defs', null,
        h('pattern', { id: 'grid', width: 20, height: 20, patternUnits: 'userSpaceOnUse' },
          h('path', { d: 'M 20 0 L 0 0 0 20', fill: 'none', stroke: 'gray', strokeWidth: 0.5, strokeOpacity: 0.1 })
        )
      ),
      h('rect', { x: viewBox.x, y: viewBox.y, width: viewBox.w, height: viewBox.h, fill: 'url(#grid)', pointerEvents: 'none' }),
      // Chip background (inner area)
      h('rect', {
        x: innerX, y: innerY, width: innerW, height: innerH,
        fill: '#f9fafb', stroke: '#d1d5db', strokeWidth: 1,
        pointerEvents: 'none'
      }),
      // Chip label
      h('text', {
        x: innerX + innerW / 2, y: innerY + innerH / 2,
        textAnchor: 'middle', dominantBaseline: 'middle',
        fontSize: Math.min(innerW, innerH) * 0.08,
        fill: '#9ca3af', style: { userSelect: 'none', pointerEvents: 'none' }
      }, `${processNode} IO Ring`),
      // Ring outline
      h('rect', {
        x: outerX, y: outerY, width: outerW, height: outerH,
        fill: 'none', stroke: '#6b7280', strokeWidth: 1,
        pointerEvents: 'none'
      }),
      // Instance rectangles
      ...instRects.map((r, i) => renderInstRect(r, i)),
      // --- Drag preview overlay ---
      dragState?.moved && dragState?.dropTarget && (() => {
        const dt = dragState.dropTarget;
        const accentColor = dragState.isCopy ? '#f59e0b' : '#3b82f6';
        const accentFill = dragState.isCopy ? 'rgba(245,158,11,0.18)' : 'rgba(59,130,246,0.15)';
        const ghostStroke = dragState.isCopy ? '#d97706' : '#2563eb';

        // 1) Highlight the target side band
        let bandX, bandY, bandW, bandH;
        if (dt.newSide === 'top')    { bandX = outerX + cTL; bandY = outerY; bandW = outerW - cTL - cTR; bandH = SIDE_THICKNESS; }
        else if (dt.newSide === 'bottom') { bandX = outerX + cBL; bandY = outerY + outerH - SIDE_THICKNESS; bandW = outerW - cBL - cBR; bandH = SIDE_THICKNESS; }
        else if (dt.newSide === 'left')   { bandX = outerX; bandY = outerY + cTL; bandW = SIDE_THICKNESS; bandH = outerH - cTL - cBL; }
        else                              { bandX = outerX + outerW - SIDE_THICKNESS; bandY = outerY + cTR; bandW = SIDE_THICKNESS; bandH = outerH - cTR - cBR; }

        // 2) Ghost rectangle at drop position
        let gx, gy, gw, gh;
        if (dt.isHorizontal) {
          gx = dt.insertX; gy = dt.insertY; gw = dt.ghostTotalW; gh = SIDE_THICKNESS;
        } else {
          gx = dt.insertX; gy = dt.insertY; gw = SIDE_THICKNESS; gh = dt.ghostTotalW;
        }

        // 3) Insertion marker line (thin, at the exact insertion edge)
        let lx1, ly1, lx2, ly2;
        if (dt.isHorizontal) {
          lx1 = dt.insertX; ly1 = dt.insertY; lx2 = dt.insertX; ly2 = dt.insertY + SIDE_THICKNESS;
        } else {
          lx1 = dt.insertX; ly1 = dt.insertY; lx2 = dt.insertX + SIDE_THICKNESS; ly2 = dt.insertY;
        }

        return h('g', { pointerEvents: 'none' },
          // Side band highlight
          h('rect', { x: bandX, y: bandY, width: bandW, height: bandH, fill: accentFill, stroke: accentColor, strokeWidth: 1.5, strokeOpacity: 0.5, rx: 2 }),
          // Ghost rectangle
          h('rect', { x: gx, y: gy, width: gw, height: gh, fill: accentFill, stroke: ghostStroke, strokeWidth: 2, strokeDasharray: '6 3', rx: 3, opacity: 0.85 }),
          // Insertion edge line
          h('line', { x1: lx1, y1: ly1, x2: lx2, y2: ly2, stroke: accentColor, strokeWidth: 3, opacity: 0.9 }),
          // Drop position count label
          h('text', {
            x: dt.isHorizontal ? gx + gw / 2 : gx + SIDE_THICKNESS / 2,
            y: dt.isHorizontal ? gy + gh / 2 : gy + gh / 2,
            textAnchor: 'middle', dy: '.3em',
            fill: accentColor, fontSize: 9, fontWeight: 700, opacity: 0.9, style: { userSelect: 'none' }
          }, dragState.isCopy ? `COPY ${dragState.selectedIds.length}` : `MOVE ${dragState.selectedIds.length}`)
        );
      })(),
      // Drag mode badge (top-left corner)
      dragState?.moved && h('g', { pointerEvents: 'none' },
        h('rect', {
          x: viewBox.x + 10, y: viewBox.y + 10, width: dragState.isCopy ? 100 : 90, height: 22,
          fill: dragState.isCopy ? '#f59e0b' : '#3b82f6', rx: 4, opacity: 0.9
        }),
        h('text', {
          x: viewBox.x + 10 + (dragState.isCopy ? 50 : 45), y: viewBox.y + 24,
          textAnchor: 'middle', fill: 'white', fontSize: 11, fontWeight: 600, style: { userSelect: 'none' }
        }, dragState.isCopy ? 'COPY (Alt)' : 'MOVE (drag)')
      ),
      // Box selection overlay
      boxSel && h('rect', {
        x: Math.min(boxSel.x0, boxSel.x1),
        y: Math.min(boxSel.y0, boxSel.y1),
        width: Math.abs(boxSel.x1 - boxSel.x0),
        height: Math.abs(boxSel.y1 - boxSel.y0),
        fill: 'rgba(59,130,246,0.1)',
        stroke: '#3b82f6',
        strokeWidth: 1,
        strokeDasharray: '4 2',
        pointerEvents: 'none'
      })
    ),
    // Legend toggle button (shown when legend is hidden)
    !legendVisible && h('button', {
      className: 'legend-toggle',
      onClick: () => setLegendVisible(true),
      title: 'Show legend'
    }, 'Legend ▶'),
    // Legend overlay
    legendVisible && h('div', { className: 'legend-overlay' },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 } },
        h('span', { style: { fontWeight: 700, color: '#374151', fontSize: 11 } },
          `Color Legend (${isT28Legend ? 'T28' : 'T180'})`
        ),
        h('button', {
          style: { background: 'none', border: 'none', color: '#9ca3af', cursor: 'pointer', fontSize: 12, padding: '0 2px', lineHeight: 1 },
          onClick: () => setLegendVisible(false),
          title: 'Hide legend'
        }, '✕')
      ),
      ...legendGroups.map(group =>
        h('div', { key: group.title },
          h('div', { className: 'legend-group-title' }, group.title),
          ...group.items.map(({ color, label }) =>
            h('div', { key: `${group.title}-${label}`, className: 'legend-item' },
              h('div', { className: 'legend-swatch', style: { background: color } }),
              h('span', { style: { fontSize: 10, fontFamily: 'monospace', color: '#374151' } }, label)
            )
          )
        )
      )
    ),
    // Context menu
    contextMenu && h(ContextMenuComponent, {
      x: contextMenu.x, y: contextMenu.y, items: contextMenu.items,
      onClose: () => setContextMenu(null)
    }),
    // Hover tooltip
    hoverTooltip && !dragState && h('div', {
      className: 'tooltip-overlay',
      style: { left: hoverTooltip.x + 12, top: hoverTooltip.y - 28 }
    }, `${hoverTooltip.inst.name} [${hoverTooltip.inst.device}] ${hoverTooltip.inst.side}`)
  );
}

// ---- ToolbarComponent ----
function ToolbarComponent() {
  const { graph, selectedIds, undo, redo, deleteInstances, addInstance, history, editorSourcePath } = useIORingStore();
  const [addMenuOpen, setAddMenuOpen] = useState(false);
  const addMenuRef = useRef(null);
  const fileInputRef = useRef(null);
  const isActive = editorSourcePath === '__server__';
  const processNode = String(graph.ring_config?.process_node || 'T180').toUpperCase();
  const isT28 = processNode.includes('28');

  useEffect(() => {
    const handler = (e) => {
      if (addMenuRef.current && !addMenuRef.current.contains(e.target)) {
        setAddMenuOpen(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const json = JSON.parse(ev.target.result);
        const internal = importAdapter(json);
        useIORingStore.getState().setGraph(internal);
      } catch (err) {
        alert('Failed to import: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const handleExport = () => {
    const exported = exportAdapter(graph);
    const blob = new Blob([JSON.stringify(exported, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'io_ring_layout.json';
    a.click(); URL.revokeObjectURL(url);
  };

  const handleConfirm = async () => {
    const exported = exportAdapter(graph);
    try {
      const res = await fetch('/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(exported)
      });
      if (res.ok) {
        document.title = '[CONFIRMED] IO Ring Layout Editor';
        alert('Layout confirmed and submitted successfully!');
      } else {
        alert('Server returned error: ' + res.status);
      }
    } catch (err) {
      alert('Failed to confirm: ' + err.message);
    }
  };

  const addMenuItems = [
    { label: 'IO Pad', type: 'pad' },
    isT28 ? { label: 'Filler (T28)', type: 'filler20a' } : { label: 'Filler (T180)', type: 'filler20' },
    isT28 ? { label: 'CUT', type: 'cut' } : null,
    !isT28 ? { label: 'Blank', type: 'blank' } : null,
    isT28 ? { label: 'Corner (Analog)', type: 'corner_analog' } : { label: 'Corner', type: 'corner' },
    isT28 ? { label: 'Corner (Digital)', type: 'corner_digital' } : null,
  ].filter(Boolean);

  return h('div', { className: 'toolbar' },
    // Import
    h('button', { className: 'toolbar-btn', onClick: () => fileInputRef.current?.click() },
      h(IconUpload), 'Import JSON'
    ),
    h('input', { ref: fileInputRef, type: 'file', accept: '.json', style: { display: 'none' }, onChange: handleImport }),
    // Export
    h('button', { className: 'toolbar-btn', onClick: handleExport },
      h(IconDownload), 'Export JSON'
    ),
    // Confirm
    h('button', { className: 'toolbar-btn confirm', onClick: handleConfirm },
      h(IconCheck), 'Confirm & Continue'
    ),
    h('div', { className: 'toolbar-separator' }),
    // Undo/Redo
    h('button', {
      className: 'toolbar-btn',
      onClick: undo,
      disabled: history.past.length === 0,
      title: 'Undo (Ctrl+Z)'
    }, h(IconUndo), 'Undo'),
    h('button', {
      className: 'toolbar-btn',
      onClick: redo,
      disabled: history.future.length === 0,
      title: 'Redo (Ctrl+Shift+Z)'
    }, h(IconRedo), 'Redo'),
    h('div', { className: 'toolbar-separator' }),
    // Add device
    h('div', { style: { position: 'relative' }, ref: addMenuRef },
      h('button', { className: 'toolbar-btn', onClick: () => setAddMenuOpen(o => !o) },
        h(IconPlus), 'Add Device', h('span', { style: { marginLeft: 2, fontSize: 10 } }, '▾')
      ),
      addMenuOpen && h('div', { className: 'dropdown-menu' },
        ...addMenuItems.map(item =>
          h('div', {
            key: item.type,
            className: 'dropdown-item',
            onClick: () => {
              addInstance('top', item.type);
              setAddMenuOpen(false);
            }
          }, item.label)
        )
      )
    ),
    // Delete selected
    selectedIds.length > 0 && h('button', {
      className: 'toolbar-btn danger',
      onClick: () => deleteInstances(selectedIds),
      title: 'Delete selected'
    }, h(IconTrash), `Delete (${selectedIds.length})`)
  );
}

// ---- LayoutEditorComponent (root) ----
function LayoutEditorComponent() {
  const { setGraph, setEditorSourcePath, setEditorProcessNode, undo, redo, selectedIds, deleteInstances, copySelection, pasteInstance } = useIORingStore();
  const [loading, setLoading] = useState(true);
  const [loadMsg, setLoadMsg] = useState('Connecting to server...');
  const [error, setError] = useState(null);

  useEffect(() => {
    setLoadMsg('Reading embedded layout data...');
    // Data is embedded directly in the page as window.__LAYOUT_DATA__ by the Python server
    // This avoids any fetch/CORS/tunnel issues entirely
    setTimeout(function() {
      try {
        var json = window.__LAYOUT_DATA__;
        if (!json) throw new Error('window.__LAYOUT_DATA__ is not set — the Python server may not have injected the data. Try reloading.');
        var instances = json.instances || json.layout_data || [];
        setLoadMsg('Building internal graph (' + instances.length + ' instances)...');
        var internalGraph;
        try {
          internalGraph = importAdapter(json);
        } catch(e) {
          throw new Error('importAdapter failed: ' + e.message);
        }
        setGraph(internalGraph);
        setEditorSourcePath('__server__');
        setEditorProcessNode((json.ring_config && json.ring_config.process_node) ? json.ring_config.process_node.toUpperCase() : null);
        setLoading(false);
      } catch(err) {
        setError(err.message || String(err));
        setLoading(false);
      }
    }, 0);
  }, []);

  useEffect(() => {
    const onKeyDown = (e) => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      const inInput = tag === 'input' || tag === 'textarea' || tag === 'select';

      if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
      if ((e.ctrlKey && e.shiftKey && e.key === 'Z') || (e.ctrlKey && e.key === 'y')) { e.preventDefault(); redo(); return; }
      if (!inInput && (e.key === 'Delete' || e.key === 'Backspace')) {
        const { selectedIds } = useIORingStore.getState();
        if (selectedIds.length) deleteInstances(selectedIds);
        return;
      }
      if (e.ctrlKey && e.key === 'c') { e.preventDefault(); copySelection([]); return; }
      if (e.ctrlKey && e.key === 'v') { e.preventDefault(); pasteInstance(null); return; }
    };
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  if (loading) return h('div', {
    style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#fff', color: '#6b7280', fontSize: 18, gap: 12 }
  },
    h('div', null, 'Loading IO Ring Layout...'),
    h('div', { style: { fontSize: 13, color: '#9ca3af', marginTop: 8 } }, loadMsg)
  );

  if (error) return h('div', {
    style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#fff', color: '#dc2626', fontSize: 16, gap: 12 }
  },
    h('div', null, 'Failed to load layout data'),
    h('div', { style: { fontSize: 13, color: '#9ca3af' } }, error),
    h('button', {
      style: { marginTop: 12, padding: '8px 20px', background: '#f3f4f6', border: '1px solid #e5e7eb', borderRadius: 6, color: '#374151', cursor: 'pointer' },
      onClick: () => window.location.reload()
    }, 'Retry')
  );

  return h('div', { className: 'editor-root layout-editor-root' },
    h(ToolbarComponent),
    h('div', { className: 'main-area' },
      h(InspectorPanelComponent),
      h(RingCanvasComponent)
    )
  );
}

// Mount
try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(LayoutEditorComponent)
  );
} catch(e) {
  var div = document.getElementById('fatal-error');
  if (div) { div.style.display = 'block'; div.textContent = 'Mount error:\n' + (e && e.stack ? e.stack : String(e)); }
}
</script>
</body>
